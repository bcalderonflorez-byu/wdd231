<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta Data -->

    <meta property="og:image" content="https://bcalderonflorez-byu.github.io/wdd231/chamber/images/preview.jpg">
    <!-- meta property="og:image", this is the image that will be displayed when the page is shared -->
    <meta property="og:url" content="https://bcalderonflorez-byu.github.io/wdd231/chamber/directory.html">
    <!-- meta property="og:url", this is the URL of the page -->
    <meta property="og:type" content="website"> <!-- meta property="og:type", this is the type of the page -->

    <!-- Style Sheets -->

    <!-- Script Files -->
